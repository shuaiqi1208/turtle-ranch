<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龟神牧场</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="assets/illustrations.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E8F5E9 100%);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 10px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #2E7D32;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .turtle-name {
            color: #666;
            font-size: 14px;
        }
        
        /* 系统栏 - 邮箱+任务+货币 */
        .system-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }
        .system-icons {
            display: flex;
            gap: 15px;
        }
        .system-icon {
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .system-icon:hover {
            transform: scale(1.1);
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #FF4444;
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 10px;
            display: none;
        }
        
        /* 货币栏 - 只有龟币 */
        .currency-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .currency-item {
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .currency-item .icon {
            font-size: 20px;
        }
        
        /* 底部导航 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            padding: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item.active {
            color: #2E7D32;
        }
        .nav-item .icon {
            font-size: 24px;
            display: block;
            margin-bottom: 3px;
        }
        .nav-item .label {
            font-size: 12px;
        }
        
        /* 场景区域 */
        .scene {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 400px;
        }
        .scene-title {
            text-align: center;
            font-size: 18px;
            color: #2E7D32;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .hidden {
            display: none !important;
        }
        
        /* 分类标签 */
        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 15px;
        }
        .category-tab {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }
        .category-tab.active {
            background: #4CAF50;
            color: white;
        }
        
        /* 图鉴网格 */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .collection-item {
            aspect-ratio: 1;
            background: rgba(200,200,200,0.3);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            position: relative;
        }
        .collection-item.unlocked {
            background: rgba(129, 199, 132, 0.3);
        }
        .collection-item .emoji {
            font-size: 32px;
        }
        .collection-item .name {
            font-size: 10px;
            margin-top: 3px;
            text-align: center;
        }
        .collection-item .price {
            font-size: 9px;
            color: #FF9800;
            margin-top: 2px;
        }
        .collection-item.locked::after {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            opacity: 0.7;
        }
        
        /* 龟神占位区域 */
        .turtle-god-area {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.3);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .turtle-god-area:hover {
            transform: scale(1.02);
        }
        .turtle-god-emoji {
            font-size: 60px;
            margin-bottom: 10px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .turtle-god-title {
            font-size: 18px;
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 5px;
        }
        .turtle-god-status {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .turtle-god-preview {
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #888;
        }
        
        /* 牧场场景 */
        .ranch-area {
            background: linear-gradient(180deg, #81C784 0%, #4CAF50 100%);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            min-height: 200px;
        }
        .animal-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .animal-card {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .animal-card:hover {
            transform: scale(1.05);
        }
        .animal-card .emoji {
            font-size: 36px;
        }
        .animal-card .name {
            font-size: 12px;
            color: #333;
        }
        
        /* 农场场景 */
        .farm-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .farm-plot {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px dashed #654321;
        }
        .farm-plot .crop {
            font-size: 28px;
        }
        .farm-plot .quality {
            font-size: 9px;
            margin-top: 3px;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .quality-normal { background: #81C784; color: white; }
        .quality-rare { background: #FFD700; color: #333; }
        .quality-legendary { background: linear-gradient(90deg, #FF6B6B, #4ECDC4); color: white; }
        
        /* 商店样式 */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .shop-item {
            background: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .shop-item .emoji {
            font-size: 32px;
        }
        .shop-item .name {
            font-size: 11px;
            margin-top: 5px;
        }
        .shop-item .price {
            color: #FF9800;
            font-weight: bold;
            font-size: 12px;
            margin-top: 3px;
        }
        
        /* DIY场景 */
        .diy-area {
            background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 100%);
            border-radius: 20px;
            padding: 20px;
            min-height: 250px;
        }
        .furniture-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
        }
        .furniture-item {
            background: white;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 24px;
        }
        /* 邮箱系统 */
        .mail-list { display: flex; flex-direction: column; gap: 10px; }
        .mail-item { background: white; border-radius: 12px; padding: 15px; cursor: pointer; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .mail-item.unread { border-left: 4px solid #4CAF50; background: #f1f8e9; }
        .mail-item.read { opacity: 0.8; }
        .mail-title { font-weight: bold; margin-bottom: 5px; }
        .mail-preview { font-size: 12px; color: #666; }
        .mail-date { font-size: 10px; color: #999; margin-top: 5px; }
        .mail-attachment { position: absolute; right: 15px; top: 15px; font-size: 20px; }
        /* 任务系统 */
        .task-list { display: flex; flex-direction: column; gap: 10px; }
        .task-item { background: white; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .task-item.completed { border-left: 4px solid #4CAF50; }
        .task-title { font-weight: bold; margin-bottom: 5px; }
        .task-desc { font-size: 12px; color: #666; }
        .task-progress { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .progress-bar { width: 100px; height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #4CAF50; transition: width 0.3s; }
        .task-reward { text-align: center; }
        .reward-coins { color: #FF9800; font-weight: bold; display: block; margin-bottom: 5px; }
        .task-reward button { background: #4CAF50; color: white; border: none; padding: 5px 15px; border-radius: 15px; cursor: pointer; }
    /* 插画图标样式 */
.animal-icon, .plant-icon, .furniture-icon {
    width: 48px;
    height: 48px;
    object-fit: contain;
    border-radius: 8px;
}

.turtle-god-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
</style>

<body>
    <!-- 加载画面 -->

    <div class="container">

                <div class="system-icon" onclick="showScene('task')" title="任务">

                </div>
            </div>
            <div class="currency-item">
                <span class="icon">🐢</span>
                <span id="coin-count">1000</span> 龟币

        </div>
        
        <!-- 牧场场景 -->
        <div class="scene" id="scene-ranch">
            <div class="scene-title">🏠 我的牧场</div>
            
            <!-- 龟神占位区域 -->
            <div class="turtle-god-area" onclick="showTurtleGodInfo()">
                <img src="assets/illustrations/turtle-god/turtle-god-main.png" class="turtle-god-img" alt="龟神">
                <div class="turtle-god-title">龟神</div>
                <div class="turtle-god-status">"我正在准备行囊..."</div>
                <div class="turtle-god-preview">

            <div class="ranch-area">

                </div>

        </div>
        
        <!-- 农场场景 -->
        <div class="scene hidden" id="scene-farm">
            <div class="scene-title">🌾 我的农场</div>
            <div class="category-tabs">
                <button class="category-tab active" onclick="showPlantCategory('vegetables')">🥕 蔬菜</button>
                <button class="category-tab" onclick="showPlantCategory('fruits')">🍎 水果</button>
                <button class="category-tab" onclick="showPlantCategory('flowers')">🌸 花卉</button>
                <button class="category-tab" onclick="showPlantCategory('herbs')">🌿 草药</button>
            </div>
            <div class="farm-grid" id="farm-grid">
                <!-- 动态加载植物 -->
            </div>
        </div>
        
        <!-- 图鉴场景 -->
        <div class="scene hidden" id="scene-collection">
            <div class="scene-title">📖 动物图鉴</div>
            <div class="category-tabs">
                <button class="category-tab active" onclick="showAnimalCategory('dogs')">🐕 犬类</button>
                <button class="category-tab" onclick="showAnimalCategory('cats')">🐈 猫类</button>
                <button class="category-tab" onclick="showAnimalCategory('birds')">🐦 鸟类</button>
                <button class="category-tab" onclick="showAnimalCategory('reptiles')">🦎 爬行类</button>
                <button class="category-tab" onclick="showAnimalCategory('rodents')">🐹 啮齿类</button>
            </div>
            <div class="collection-grid" id="collection-grid">
                <!-- 动态加载动物 -->
            </div>
        </div>
        
        <!-- DIY场景 -->
        <div class="scene hidden" id="scene-diy">
            <div class="scene-title">🎨 DIY牧场</div>
            <div class="category-tabs">
                <button class="category-tab active" onclick="showFurnitureCategory('seats')">🪑 座椅</button>
                <button class="category-tab" onclick="showFurnitureCategory('decorations')">🌳 装饰</button>
                <button class="category-tab" onclick="showFurnitureCategory('themes')">🏮 主题</button>
            </div>
            <div class="diy-area">
                <p style="text-align: center; color: #666; margin-bottom: 10px;">点击家具购买并装饰牧场</p>
                <div class="furniture-grid" id="furniture-grid">
                    <!-- 动态加载家具 -->
                </div>
            </div>
        </div>
        
        <!-- 商店场景 -->
        <div class="scene hidden" id="scene-shop">
            <div class="scene-title">🛒 商店</div>
            <div class="category-tabs">
                <button class="category-tab active" onclick="showShopCategory('animals')">🐾 动物</button>
                <button class="category-tab" onclick="showShopCategory('plants')">🌱 植物</button>
                <button class="category-tab" onclick="showShopCategory('furniture')">🪑 家具</button>
            </div>
            <div class="shop-grid" id="shop-grid">
                <!-- 动态加载商店商品 -->
            </div>
        </div>
        
        <!-- 邮箱场景 -->
        <div class="scene hidden" id="scene-mail">
            <div class="scene-title">📧 邮箱</div>
            <div class="mail-list" id="mail-list">
                <!-- 动态加载邮件 -->
            </div>
        </div>
        
        <!-- 任务场景 -->
        <div class="scene hidden" id="scene-task">
            <div class="scene-title">📋 任务</div>
            <div class="task-list" id="task-list">
                <!-- 动态加载任务 -->
            </div>
        </div>
    </div>
    
    <!-- 底部导航栏 -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showScene('ranch')">
            <span class="icon">🏠</span>
            <span class="label">牧场</span>
        </div>
        <div class="nav-item" onclick="showScene('farm')">
            <span class="icon">🌾</span>

        </div>
        <div class="nav-item" onclick="showScene('collection')">

        </div>
        <div class="nav-item" onclick="showScene('diy')">

        </div>
        <div class="nav-item" onclick="showScene('shop')">
            <span class="icon">🛒</span>
            <span class="label">商店</span>
        </div>
    </div>

    <script>
        // 当前选中的分类
        let currentAnimalCategory = 'dogs';
        let currentPlantCategory = 'vegetables';
        let currentFurnitureCategory = 'seats';
        let currentShopCategory = 'animals';
        
        // 切换场景
        // 显示龟神信息
        function showTurtleGodInfo() {
            alert("🐢 龟神系统即将解锁！\n\n即将推出：\n• 龟神出门云游\n• 带回稀有礼物\n• 云游日记记录\n• 书信互动\n\n敬请期待！");
        }
        function showScene(scene) {
            document.querySelectorAll('.scene').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // 如果是邮箱或任务场景，不需要设置nav-item active
            if (scene !== 'mail' && scene !== 'task') {
                event.currentTarget.classList.add('active');
            }
            
            document.getElementById('scene-' + scene).classList.remove('hidden');
            
            // 初始化场景内容
            if (scene === 'collection') renderAnimalCollection();
            if (scene === 'farm') renderPlantFarm();
            if (scene === 'diy') renderFurnitureDIY();
            if (scene === 'shop') renderShop();
            if (scene === 'ranch') renderRanch();
            if (scene === 'mail') mailSystem.renderMailList();
            if (scene === 'task') taskSystem.renderTaskList();
        }
        
        // 渲染牧场
        function renderRanch() {
            const container = document.getElementById('ranch-animals');
            container.innerHTML = '';
            
            // 显示已解锁的动物
            Object.values(COLLECTION_DATA.animals).forEach(category => {
                category.items.forEach(item => {
                    if (item.unlocked) {
                        container.innerHTML += `
                            <div class="animal-card" onclick="interactAnimal('${item.id}')">
                                <div class="emoji">${item.emoji}</div>
                                <div class="name">${item.name}</div>
                            </div>
                        `;
                    }
                });
            });
        }
        
        // 渲染动物图鉴
        function renderAnimalCollection() {
            const category = COLLECTION_DATA.animals[currentAnimalCategory];
            const container = document.getElementById('collection-grid');
            container.innerHTML = '';
            
            category.items.forEach(item => {
                const lockedClass = item.unlocked ? 'unlocked' : 'locked';
                // 图鉴只显示收集状态，不显示价格
                
                container.innerHTML += `
                    <div class="collection-item ${lockedClass}">
                        <span class="emoji">${item.emoji}</span>
                        <span class="name">${item.name}</span>
                    </div>
                `;
            });
        }
        
        // 渲染植物农场
        function renderPlantFarm() {
            const category = COLLECTION_DATA.plants[currentPlantCategory];
            const container = document.getElementById('farm-grid');
            container.innerHTML = '';
            
            category.items.slice(0, 9).forEach(item => {
                container.innerHTML += `
                    <div class="farm-plot" onclick="plantCrop('${item.id}')">
                        <span class="crop">${item.emoji}</span>
                        <span class="quality quality-normal">${item.name}</span>
                    </div>
                `;
            });
        }
        
        // 渲染家具DIY
        function renderFurnitureDIY() {
            const category = COLLECTION_DATA.furniture[currentFurnitureCategory];
            const container = document.getElementById('furniture-grid');
            container.innerHTML = '';
            
            category.items.forEach(item => {
                // DIY场景只显示家具，不显示价格
                container.innerHTML += `
                    <div class="furniture-item">
                        <div>${item.emoji}</div>
                        <div style="font-size: 10px; margin-top: 5px;">${item.name}</div>
                    </div>
                `;
            });
        }
        
        // 渲染商店
        function renderShop() {
            const container = document.getElementById('shop-grid');
            container.innerHTML = '';
            
            if (currentShopCategory === 'animals') {
                Object.values(COLLECTION_DATA.animals).forEach(category => {
                    category.items.forEach(item => {
                        if (!item.unlocked) {
                            container.innerHTML += `
                                <div class="shop-item" onclick="buyAnimal('${item.id}', ${item.price})">
                                    <div class="emoji">${item.emoji}</div>
                                    <div class="name">${item.name}</div>
                                    <div class="price">🐢 ${item.price}</div>
                                </div>
                            `;
                        }
                    });
                });
            } else if (currentShopCategory === 'plants') {
                // 商店显示植物价格
                Object.values(COLLECTION_DATA.plants).forEach(category => {
                    category.items.forEach(item => {
                        container.innerHTML += `
                            <div class="shop-item" onclick="plantCrop('${item.id}')">
                                <div class="emoji">${item.emoji}</div>
                                <div class="name">${item.name}</div>
                                <div class="price">🐢 ${item.price}</div>
                            </div>
                        `;
                    });
                });
            } else if (currentShopCategory === 'furniture') {
                // 商店显示家具价格
                Object.values(COLLECTION_DATA.furniture).forEach(category => {
                    category.items.forEach(item => {
                        container.innerHTML += `
                            <div class="shop-item" onclick="buyFurniture('${item.id}', ${item.price})">
                                <div class="emoji">${item.emoji}</div>
                                <div class="name">${item.name}</div>
                                <div class="price">🐢 ${item.price}</div>
                            </div>
                        `;
                    });
                });
            }
        }
        
        // 切换动物分类
        function showAnimalCategory(category) {
            currentAnimalCategory = category;
            document.querySelectorAll('#scene-collection .category-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderAnimalCollection();
        }
        
        // 切换植物分类
        function showPlantCategory(category) {
            currentPlantCategory = category;
            document.querySelectorAll('#scene-farm .category-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderPlantFarm();
        }
        
        // 切换家具分类
        function showFurnitureCategory(category) {
            currentFurnitureCategory = category;
            document.querySelectorAll('#scene-diy .category-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderFurnitureDIY();
        }
        
        // 切换商店分类
        function showShopCategory(category) {
            currentShopCategory = category;
            document.querySelectorAll('#scene-shop .category-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderShop();
        }
        
        // 购买动物
        function buyAnimal(id, price) {
            if (currency.spendCoins(price)) {
                // 解锁动物
                Object.values(COLLECTION_DATA.animals).forEach(category => {
                    const item = category.items.find(i => i.id === id);
                    if (item) item.unlocked = true;
                });
                alert('购买成功！');
                
                // 更新任务进度
                taskSystem.updateProgress('buy_animal');
                
                renderAnimalCollection();
                renderRanch();
            }
        }
        
        // 购买家具
        function buyFurniture(id, price) {
            if (currency.spendCoins(price)) {
                alert('家具购买成功！');
            }
        }
        
        // 种植作物
        function plantCrop(id) {
            alert('开始种植！');
            
            // 更新任务进度
            taskSystem.updateProgress('plant');
        }
        
        // 与动物互动
        function interactAnimal(id) {
            currency.addCoins(10);
            alert('互动成功！获得10龟币！');
            
            // 更新任务进度
            taskSystem.updateProgress('interact');
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 加载完成后隐藏加载画面
            setTimeout(() => {
                document.getElementById('loading').classList.add('hide');
            }, 1000);
            // 初始化系统
            await gameStorage.init();
            await currency.init();
            await mailSystem.init();
            await taskSystem.init();
            
            renderRanch();
        });
    // 弹窗函数
        function showModal(title, text) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-text').textContent = text;
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }
        
        // 替换alert为自定义弹窗
        window.alert = function(text) {
            showModal('提示', text);
        };
    </script>

    <!-- 弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">提示</div>
            <div class="modal-text" id="modal-text">内容</div>
            <button class="modal-btn" onclick="closeModal()">确定</button>
        </div>
    </div>
</body>
</html>
